# Alembic configuration. The database URL is NOT hard-coded here —
# migrations/env.py reads it from $DATABASE_URL (or a URL passed
# programmatically by app.db.run_migrations).

[alembic]
script_location = migrations
prepend_sys_path = .
# sqlalchemy.url is intentionally left blank; env.py supplies it.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
