name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: math
          POSTGRES_PASSWORD: math
          POSTGRES_DB: math_adventures
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U math -d math_adventures"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests (unit + Postgres integration)
        env:
          # The Postgres service makes the otherwise-skipped
          # test_postgres_integration.py suite run in CI.
          INTEGRATION_DATABASE_URL: postgresql+psycopg://math:math@localhost:5432/math_adventures
        run: python -m pytest -q

  frontend:
    name: Frontend (tsc + eslint + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Run tests
        run: npm test
      - name: Build
        run: npm run build
